name: KK FUNDA Core Concepts Demo

on:
  push:
    branches: [ main ]

jobs:

  build-job:
    name: Build Stage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'   # ✅ works only if package-lock.json exists

      - name: Install Dependencies
        run: npm install

      - name: Build App
        run: npm run build


  test-job:
    name: Testing Stage
    runs-on: ubuntu-latest
    needs: build-job

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: npm test